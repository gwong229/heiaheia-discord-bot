name: HeiaHeia Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:       # allow manual run

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # optional, safer

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Commit updated seen_posts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_posts.json
          git commit -m "Update seen posts" || echo "No changes to commit"
          git push origin main

      - name: Run bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          HEIA_SESSION: ${{ secrets.HEIA_SESSION }} # optional if you base64 encode
        run: |
          echo "$HEIA_SESSION" | base64 --decode > heia_session.json
          node bot.js
      