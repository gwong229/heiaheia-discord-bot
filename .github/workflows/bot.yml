name: HeiaHeia Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # runs every 5 minutes
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          HEIA_SESSION: ${{ secrets.HEIA_SESSION }}
        run: timeout 4m node bot.js || echo "Bot failed or timed out"

      - name: Commit updated seen posts (with heartbeat)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add seen_posts.json

          # If there are changes → normal commit
          # If no changes → heartbeat commit
          git diff --cached --quiet \
            && git commit --allow-empty -m "heartbeat" \
            || git commit -m "Update seen posts from workflow"

          git push
